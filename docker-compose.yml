services:
  ms-users:
    build: .
    container_name: ms-users
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DB_HOST: mysql-users
      DB_PORT: 3306
      DB_NAME: porsusde_urbansphere
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: urbansphere-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mysql-users:
        condition: service_healthy
    networks:
      - urbansphere-network

  mysql-users:
    image: mysql:8.0
    container_name: mysql-users
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: porsusde_urbansphere
    ports:
      - '3307:3306'
    volumes:
      - mysql-users-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urbansphere-network

volumes:
  mysql-users-data:

networks:
  urbansphere-network:
    driver: bridge
