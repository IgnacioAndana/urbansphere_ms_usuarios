name: Deploy MS Usuarios (prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/microservicios/usuarios

            git fetch origin main
            git reset --hard origin/main

            export HUSKY=0
            npm ci
            npm run build

            pm2 restart 0
            pm2 save